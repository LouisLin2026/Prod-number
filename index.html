function log(msg, cls) {
  const el = document.getElementById('log');
  el.style.display = 'block';
  el.innerHTML += `<span class="${cls||''}">${msg}</span>\n`;
  el.scrollTop = el.scrollHeight;
}

async function fbPut(path, data) {
  const r = await fetch(`${FB}/${path}.json`, {
    method: 'PUT',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify(data)
  });
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}
async function fbPost(path, data) {
  const r = await fetch(`${FB}/${path}.json`, {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify(data)
  });
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}

async function doInit() {
  const btn = document.getElementById('btn');
  btn.disabled = true;
  btn.textContent = '初始化中...';

  try {
    // Step 1: Write counters
    log('① 寫入計數器（各國別/年度最高流水號）...', 'info');
    await fbPut('prod_req/counters', COUNTERS);
    log('   ✓ 計數器寫入完成', 'ok');
    Object.entries(COUNTERS).forEach(([k,v]) => log(`   ${k} → 最高 ${String(v).padStart(3,'0')} 號`));

    // Step 2: Write records one by one
    log('\n② 寫入 115年取號記錄（33筆）...', 'info');
    for (let i = 0; i < RECORDS.length; i++) {
      const r = RECORDS[i];
      await fbPost('prod_req/records', r);
      log(`   ✓ ${r.num} ${r.name}`, 'ok');
    }

    log('\n✅ 初始化完成！請關閉此頁面，開啟取號系統即可看到記錄。', 'ok');
    btn.textContent = '✅ 初始化完成';
    btn.style.background = '#2D5A3D';
  } catch(e) {
    log(`\n❌ 錯誤：${e.message}`, 'err');
    log('請確認 Firebase 規則允許寫入，或聯絡管理員', 'err');
    btn.disabled = false;
    btn.textContent = '重新嘗試';
  }
}
