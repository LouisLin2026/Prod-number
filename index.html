<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>產品開發需求單取號系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#FAFAF8;--surface:#fff;--border:#E8E5DF;--border-s:#C8C5BE;
  --text:#1A1A18;--muted:#6B6B68;--hint:#A8A8A5;
  --accent:#1F3864;--accent-l:#EEF2F8;--accent-t:#1F3864;
  --green:#2D5A3D;--green-l:#EAF2EC;
  --amber:#B8690A;--amber-l:#FEF3E2;
  --red:#C0392B;--red-l:#FBEAE8;
  --blue:#0369A1;--blue-l:#EFF8FF;
  --radius:10px;--radius-s:6px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.6;min-height:100vh}

/* ── Header ── */
.header{background:var(--accent);color:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;user-select:none}
.h-left{display:flex;flex-direction:column;gap:2px}
.h-title{font-size:16px;font-weight:700;display:flex;align-items:center;gap:7px}
.h-sub{font-size:11px;opacity:.75;display:flex;align-items:center;gap:5px}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#4ade80;flex-shrink:0;transition:background .3s}
.sync-dot.off{background:#fbbf24}.sync-dot.err{background:#f87171}

/* hamburger */
.menu-btn{width:36px;height:36px;border:none;background:rgba(255,255,255,.15);border-radius:var(--radius-s);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;flex-shrink:0}
.menu-btn span{display:block;width:18px;height:2px;background:#fff;border-radius:2px;transition:all .2s}

/* ── Slide-in menu overlay ── */
.menu-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:none;align-items:flex-start;justify-content:flex-end}
.menu-overlay.open{display:flex}
.menu-panel{background:var(--surface);width:240px;min-height:100vh;padding:0;box-shadow:-4px 0 20px rgba(0,0,0,.15);display:flex;flex-direction:column}
.menu-header{background:var(--accent);color:#fff;padding:14px 16px;display:flex;align-items:center;justify-content:space-between}
.menu-header-title{font-size:14px;font-weight:700}
.menu-close{width:30px;height:30px;border:none;background:rgba(255,255,255,.2);border-radius:var(--radius-s);cursor:pointer;color:#fff;font-size:16px;display:flex;align-items:center;justify-content:center}
.menu-body{padding:16px;flex:1}
.menu-section{margin-bottom:20px}
.menu-section-title{font-size:10px;font-weight:700;letter-spacing:.08em;color:var(--hint);text-transform:uppercase;margin-bottom:8px}
.menu-item{display:block;width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:var(--radius-s);background:var(--bg);font-family:inherit;font-size:13px;color:var(--text);cursor:pointer;text-align:left;margin-bottom:6px}
.menu-item:hover{background:var(--accent-l);border-color:var(--accent);color:var(--accent-t)}
.menu-item.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* PIN overlay */
.pin-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:300;display:none;align-items:center;justify-content:center;padding:20px}
.pin-overlay.open{display:flex}
.pin-box{background:var(--surface);border-radius:var(--radius);padding:28px 24px;width:100%;max-width:300px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.18)}
.pin-icon{width:56px;height:56px;background:var(--accent-l);border-radius:50%;margin:0 auto 14px;display:flex;align-items:center;justify-content:center;font-size:24px}
.pin-title{font-size:16px;font-weight:700;color:var(--accent);margin-bottom:4px}
.pin-sub{font-size:12px;color:var(--muted);margin-bottom:18px}
.pin-input{width:100%;padding:13px;text-align:center;font-size:24px;letter-spacing:.4em;border:1px solid var(--border-s);border-radius:var(--radius-s);font-family:inherit;background:var(--bg);color:var(--text);outline:none;margin-bottom:8px}
.pin-input:focus{border-color:var(--accent);background:#fff}
.pin-err{font-size:12px;color:var(--red);min-height:18px;margin-bottom:8px}
.pin-row{display:flex;gap:8px}
.pin-ok{flex:1;padding:10px;border:none;border-radius:var(--radius-s);background:var(--accent);color:#fff;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer}
.pin-cancel{padding:10px 16px;border:1px solid var(--border-s);border-radius:var(--radius-s);background:#fff;cursor:pointer;color:var(--muted);font-family:inherit;font-size:13px}

/* ── User nav ── */
.nav{display:flex;background:var(--surface);border-bottom:1px solid var(--border)}
.nav-btn{flex:1;padding:10px 6px 8px;border:none;background:none;font-family:inherit;font-size:12px;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent}
.nav-btn.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:700}
.nav-btn.red{color:var(--red)}

/* ── Admin bar ── */
.admin-bar{background:var(--red-l);border-bottom:2px solid var(--red);padding:7px 16px;display:none;align-items:center;justify-content:space-between}
.admin-bar.show{display:flex}
.admin-bar-label{font-size:12px;font-weight:700;color:var(--red)}
.admin-exit{font-size:11px;padding:3px 10px;border:1px solid var(--red);border-radius:var(--radius-s);background:#fff;cursor:pointer;color:var(--red);font-family:inherit}

/* ── Content ── */
.content{padding:14px;max-width:480px;margin:0 auto}

/* Card */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.card-title{font-size:13px;font-weight:700;color:var(--accent);margin-bottom:12px;display:flex;align-items:center;gap:6px}

/* Fields */
.field{margin-bottom:10px}
.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px;font-weight:500}
.req{color:var(--red);margin-left:2px}
.field input,.field select,.field textarea{width:100%;padding:8px 10px;border:1px solid var(--border-s);border-radius:var(--radius-s);font-family:inherit;font-size:13px;background:var(--bg);color:var(--text);outline:none}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent);background:#fff}
.field textarea{resize:vertical;min-height:60px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.err-msg{color:var(--red);font-size:11px;margin-top:3px;display:none}

/* Add option row */
.add-opt-row{display:flex;gap:6px;margin-top:5px}
.add-opt-input{flex:1;padding:6px 8px;border:1px solid var(--border-s);border-radius:var(--radius-s);font-family:inherit;font-size:12px;background:var(--bg);color:var(--text);outline:none}
.add-opt-input:focus{border-color:var(--blue)}
.add-opt-btn{padding:6px 10px;border:1px solid var(--blue);border-radius:var(--radius-s);background:var(--blue-l);color:var(--blue);font-family:inherit;font-size:12px;cursor:pointer;font-weight:500;white-space:nowrap}

/* Preview */
.preview-box{background:var(--accent-l);border:1px solid #C8D8F0;border-radius:var(--radius-s);padding:12px 14px;text-align:center;margin-bottom:12px}
.preview-num{font-size:26px;font-weight:700;color:var(--accent);letter-spacing:2px;font-family:monospace}
.preview-label{font-size:11px;color:var(--muted);margin-top:3px}

/* Info box */
.info-box{background:var(--amber-l);border:1px solid #E8C380;border-radius:var(--radius-s);padding:10px 12px;font-size:12px;color:#7A4500;margin-bottom:12px;line-height:1.65}

/* Buttons */
.btn-p{display:block;width:100%;padding:11px;border:none;border-radius:var(--radius-s);background:var(--accent);color:#fff;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer}
.btn-p:hover{background:#162a4d}
.btn-p:disabled{background:#A8B4C4;cursor:not-allowed}
.btn-s{padding:7px 14px;border:1px solid var(--border-s);border-radius:var(--radius-s);background:#fff;cursor:pointer;color:var(--muted);font-family:inherit;font-size:12px}
.btn-s:hover{background:var(--bg)}

/* Toast */
.toast{background:var(--green-l);border:1px solid #9FC9AA;border-radius:var(--radius-s);padding:12px 14px;margin-bottom:12px;display:none}
.toast-num{font-size:22px;font-weight:700;color:var(--green);font-family:monospace;display:flex;align-items:center;gap:8px}
.toast-msg{font-size:12px;color:var(--green);margin-top:3px}
.copy-big-btn{font-size:12px;padding:4px 10px;border:1px solid var(--green);border-radius:var(--radius-s);background:#fff;cursor:pointer;color:var(--green);font-family:inherit;margin-left:auto;flex-shrink:0}

/* Stats */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:12px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-s);padding:8px;text-align:center}
.stat-v{font-size:20px;font-weight:700;color:var(--accent)}
.stat-l{font-size:10px;color:var(--muted)}

/* History table */
.history-table{width:100%;border-collapse:collapse;font-size:12px}
.history-table th{text-align:left;padding:7px 8px;border-bottom:2px solid var(--border-s);color:var(--muted);font-weight:600;font-size:11px}
.history-table td{padding:7px 8px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle}
.history-table tr:last-child td{border-bottom:none}
.num-badge{background:var(--accent-l);color:var(--accent);font-weight:700;padding:2px 7px;border-radius:4px;font-size:11px;font-family:monospace;white-space:nowrap;display:inline-block}
.cat-badge{display:inline-block;font-size:10px;padding:1px 6px;border-radius:20px;background:var(--blue-l);color:var(--blue);white-space:nowrap}
.copy-btn{font-size:10px;padding:2px 6px;border:1px solid var(--border-s);border-radius:4px;background:#fff;cursor:pointer;color:var(--muted);font-family:inherit;margin-left:4px;vertical-align:middle}
.filter-row{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.filter-select{padding:5px 8px;border:1px solid var(--border-s);border-radius:var(--radius-s);font-family:inherit;font-size:12px;background:var(--surface);color:var(--text);outline:none}

/* Empty / Loading */
.empty{text-align:center;padding:24px;color:var(--hint);font-size:13px}
.loading-box{text-align:center;padding:30px;color:var(--hint)}
.loading-spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}

/* Admin init log */
.init-log{background:#1E1E1E;border-radius:var(--radius-s);padding:12px;font-size:12px;color:#9CDCFE;font-family:monospace;line-height:1.8;max-height:260px;overflow-y:auto;margin-top:10px;display:none}
.log-ok{color:#4ade80}.log-err{color:#f87171}.log-info{color:#fbbf24}
.counter-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px}
.counter-table th{text-align:left;padding:6px 8px;border-bottom:2px solid var(--border-s);color:var(--muted);font-weight:600;font-size:11px}
.counter-table td{padding:6px 8px;border-bottom:1px solid var(--border)}
.counter-table tr:last-child td{border-bottom:none}
/* proj card styles */
.wtabs{display:flex;border:1px solid var(--border);border-radius:var(--radius-s);overflow:hidden;margin-bottom:0;background:var(--surface)}
.wt{flex:1;padding:8px 6px;border:none;background:none;font-family:inherit;font-size:12px;font-weight:500;color:var(--muted);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:1px;border-right:1px solid var(--border);transition:background .12s}
.wt:last-child{border-right:none}
.wt.on{background:var(--accent);color:#fff}
.wt-sub{font-size:10px;opacity:.7}
.wt-n{font-size:10px;font-weight:700;padding:1px 6px;border-radius:20px;background:var(--red-l);color:var(--red);margin-top:1px;min-width:20px;text-align:center}
.wt.on .wt-n{background:rgba(255,255,255,.25);color:#fff}
.proj-sec{margin-bottom:8px;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;background:var(--surface);box-shadow:0 1px 3px rgba(0,0,0,.04)}
.proj-sec-hdr{display:flex;align-items:center;gap:7px;padding:9px 12px;background:var(--bg);cursor:pointer;user-select:none;border-bottom:1px solid var(--border)}
.proj-sec-hdr:hover{background:#F0EDE8}
.proj-sec-arr{font-size:10px;color:var(--hint);transition:transform .15s;flex-shrink:0}
.proj-sec-arr.op{transform:rotate(90deg)}
.proj-sec-t{font-size:13px;font-weight:700;color:var(--text);flex:1}
.proj-sec-cnt{font-size:11px;color:var(--muted);background:var(--border);border-radius:20px;padding:1px 7px}
.proj-sec-body{display:none;padding:5px 6px 6px}
.proj-sec-body.op{display:block}
.pcard{border:1px solid var(--border);border-radius:var(--radius-s);margin-bottom:4px;background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.pcard.editing{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-l)}
.pcard-hdr{display:flex;align-items:center;gap:6px;padding:8px 10px;cursor:pointer;user-select:none}
.pcard-arr{font-size:9px;color:var(--hint);transition:transform .15s;flex-shrink:0}
.pcard-arr.op{transform:rotate(90deg)}
.pcard-info{flex:1;min-width:0}
.pcard-title-row{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.pcard-title{font-size:13px;font-weight:500;color:var(--text);line-height:1.3}
.pcard-num{font-size:10px;padding:1px 5px;border-radius:4px;background:var(--accent-l);color:var(--accent-t);flex-shrink:0;font-family:monospace}
.pcard-date{font-size:10px;padding:1px 6px;border-radius:20px;background:var(--bg);color:var(--muted);border:1px solid var(--border);flex-shrink:0}
.pcard-status{font-size:10px;padding:2px 8px;border-radius:20px;flex-shrink:0;font-weight:600}
.pcard-saved{font-size:10px;color:var(--green);display:none;flex-shrink:0}
.pcard-body{display:none;padding:0 10px 10px;border-top:1px solid var(--border)}
.pcard-body.op{display:block}
.pfi{padding:7px 0 4px;font-size:12px;line-height:1.7}
.pfi-row{display:flex;gap:6px;margin-bottom:2px}
.pfi-label{color:var(--hint);white-space:nowrap;width:56px;flex-shrink:0}
.pfi-val{color:var(--muted);flex:1;word-break:break-all}
.pupd-box{background:var(--bg);border-radius:var(--radius-s);padding:6px 8px;font-size:11.5px;color:var(--muted);line-height:1.0;margin:3px 0;border:1px solid var(--border)}
.upd-line{padding:4px 0;border-bottom:1px solid var(--border);line-height:1.55;word-break:break-word}
.upd-line:last-child{border-bottom:none}
.upd-seq{font-weight:700;color:var(--accent-t);font-family:monospace;margin-right:2px}
.upd-latest .upd-seq{color:var(--amber)}
.upd-latest{color:var(--text)}
.pedit-area{background:var(--accent-l);border-radius:var(--radius-s);padding:9px 10px;margin-top:7px;border:1px solid #C8D8F0;display:none}
.pedit-row{display:flex;align-items:center;gap:7px;margin-bottom:6px}
.pedit-label{font-size:11px;color:var(--muted);white-space:nowrap;width:56px;flex-shrink:0}
.pedit-area select,.pedit-area input,.pedit-area textarea{font-size:12px;padding:5px 8px;border:1px solid var(--border-s);border-radius:var(--radius-s);font-family:inherit;background:#fff;color:var(--text);flex:1;outline:none}
.pedit-area select:focus,.pedit-area input:focus,.pedit-area textarea:focus{border-color:var(--accent)}
.pedit-area textarea{resize:vertical;min-height:50px}
.edit-btn{font-size:11px;padding:3px 8px;border:1px solid var(--border-s);border-radius:var(--radius-s);background:#fff;cursor:pointer;color:var(--muted);font-family:inherit}
.psave-btn{font-size:12px;padding:5px 14px;border:none;border-radius:var(--radius-s);background:var(--accent);color:#fff;cursor:pointer;font-weight:700;font-family:inherit}
.pcancel-btn{font-size:12px;padding:5px 11px;border:1px solid var(--border-s);border-radius:var(--radius-s);background:#fff;cursor:pointer;color:var(--muted);font-family:inherit}
.pstat-done{opacity:.45}.pstat-done .pcard-title{text-decoration:line-through}
.nb-prog{background:var(--amber-l);color:var(--amber)}
.nb-done{background:var(--green-l);color:var(--green)}
.nb-stop{background:var(--red-l);color:var(--red)}
.nb-pend{background:var(--blue-l);color:var(--blue)}
.nb-def{background:var(--bg);color:var(--muted);border:1px solid var(--border)}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>

<!-- ── Header ── -->
<div class="header">
  <div class="h-left">
    <div class="h-title">
      <span class="sync-dot" id="syn-dot" style="background:#fbbf24"></span>
      📋 產品開發需求單取號系統
    </div>
    <div class="h-sub" id="h-sub">台北/宜蘭共用 · 即時同步</div>
  </div>
  <button class="menu-btn" onclick="openMenu()" aria-label="選單">
    <span></span><span></span><span></span>
  </button>
</div>

<!-- ── Admin bar（後台模式時顯示）── -->
<div class="admin-bar" id="admin-bar">
  <span class="admin-bar-label">⚙️ 管理員後台</span>
  <button class="admin-exit" onclick="exitAdmin()">← 返回取號</button>
</div>

<!-- ── 一般用戶 Nav ── -->
<div class="nav" id="user-nav">
  <button class="nav-btn active" id="nav-new" onclick="switchUserTab('new')">新增取號</button>
  <button class="nav-btn" id="nav-history" onclick="switchUserTab('history')">取號記錄</button>
</div>

<!-- ── 後台 Nav ── -->
<div class="nav" id="admin-nav" style="display:none">
  <button class="nav-btn active" id="nav-adm-proj"    onclick="switchAdminTab('adm-proj')">專案控管</button>
  <button class="nav-btn"        id="nav-adm-options" onclick="switchAdminTab('adm-options')">選項管理</button>
</div>

<!-- ── Main content ── -->
<div class="content" id="main-content"></div>

<!-- ── Slide menu ── -->
<div class="menu-overlay" id="menu-overlay" onclick="closeMenuIfOutside(event)">
  <div class="menu-panel" id="menu-panel">
    <div class="menu-header">
      <span class="menu-header-title">⚙️ 系統選單</span>
      <button class="menu-close" onclick="closeMenu()">✕</button>
    </div>
    <div class="menu-body">
      <div class="menu-section">
        <div class="menu-section-title">取號功能</div>
        <button class="menu-item" onclick="menuGoTab('new')">📋 新增取號</button>
        <button class="menu-item" onclick="menuGoTab('history')">📊 取號記錄</button>
      </div>
      <div class="menu-section">
        <div class="menu-section-title">專案管理</div>
        <button class="menu-item" onclick="closeMenu();S.adminOK=true;S.tab='adm-proj';render();scrollTo(0,0)" id="menu-proj-btn">📊 研發專案控管</button>
      </div>
      <div class="menu-section">
        <div class="menu-section-title">管理員</div>
        <button class="menu-item" id="menu-admin-btn" onclick="menuAdminClick()">🔐 進入後台</button>
      </div>
    </div>
  </div>
</div>

<!-- ── PIN overlay ── -->
<div class="pin-overlay" id="pin-overlay">
  <div class="pin-box">
    <div class="pin-icon">🔐</div>
    <div class="pin-title">管理員驗證</div>
    <div class="pin-sub">請輸入後台密碼</div>
    <input class="pin-input" type="password" id="pin-input" maxlength="8" placeholder="••••"
      onkeydown="if(event.key==='Enter')verifyPin()">
    <div class="pin-err" id="pin-err"></div>
    <div class="pin-row">
      <button class="pin-cancel" onclick="closePin()">取消</button>
      <button class="pin-ok" onclick="verifyPin()">進入</button>
    </div>
  </div>
</div>

<script>
// ── Firebase ──────────────────────────────────────────────────────────────────
const FB='https://evaluation-survey-form-default-rtdb.firebaseio.com';
const P_COUNTERS='prod_req/counters';
const P_RECORDS='prod_req/records';
const P_OPTIONS='prod_req/options';
const ADMIN_PIN='8888';

async function fbGet(p){try{const r=await fetch(`${FB}/${p}.json`);if(!r.ok)return null;return r.json();}catch(e){return null;}}
async function fbSet(p,v){try{await fetch(`${FB}/${p}.json`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(v)});return true;}catch(e){return false;}}
async function fbPatch(p,v){try{await fetch(`${FB}/${p}.json`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify(v)});return true;}catch(e){return false;}}
async function fbPost(p,v){try{const r=await fetch(`${FB}/${p}.json`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(v)});return r.ok;}catch(e){return false;}}

// ── State ─────────────────────────────────────────────────────────────────────
let S={
  tab:'new',
  adminOK:false,
  counters:{},
  records:[],
  options:{countries:[],categories:[]},
  projDetails:{},
  lastToastNum:'',
  fbLoaded:false
};

function getRocYear(){return String(new Date().getFullYear()-1911).padStart(3,'0');}
function makeKey(c){return c+getRocYear();}
function curSeq(c){return S.counters[makeKey(c)]||0;}
function nextSeq(c){return curSeq(c)+1;}
function fmtNum(c,yr,seq){return c+yr+String(seq).padStart(3,'0');}
function escH(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function setSyn(st){
  const d=document.getElementById('syn-dot');
  if(st==='ok')d.style.background='#4ade80';
  else if(st==='sv')d.style.background='#fbbf24';
  else d.style.background='#f87171';
}

// ── Menu ──────────────────────────────────────────────────────────────────────
function openMenu(){
  document.getElementById('menu-overlay').classList.add('open');
  // Update menu button label based on state
  const ab=document.getElementById('menu-admin-btn');
  if(ab) ab.textContent=S.adminOK?'✕ 離開後台':'🔐 進入後台';
}
function closeMenu(){document.getElementById('menu-overlay').classList.remove('open');}
function closeMenuIfOutside(e){if(e.target===document.getElementById('menu-overlay'))closeMenu();}

function menuGoTab(tab){
  closeMenu();
  if(S.adminOK) exitAdmin();
  S.tab=tab;render();scrollTo(0,0);
}
function menuAdminClick(){
  if(S.adminOK){closeMenu();exitAdmin();return;}
  closeMenu();
  openPin();
}

// ── PIN ───────────────────────────────────────────────────────────────────────
function openPin(){
  document.getElementById('pin-input').value='';
  document.getElementById('pin-err').textContent='';
  document.getElementById('pin-overlay').classList.add('open');
  setTimeout(()=>document.getElementById('pin-input').focus(),100);
}
function closePin(){document.getElementById('pin-overlay').classList.remove('open');}
function verifyPin(){
  const v=document.getElementById('pin-input').value;
  if(v===ADMIN_PIN){
    closePin();
    S.adminOK=true;S.tab='adm-proj';
    if(!S.fbLoaded)loadFirebase().then(()=>render());else render();
  }else{
    document.getElementById('pin-err').textContent='密碼錯誤，請再試一次';
    document.getElementById('pin-input').value='';
    document.getElementById('pin-input').focus();
  }
}
function exitAdmin(){
  S.adminOK=false;S.tab='new';render();scrollTo(0,0);
}

// ── Render dispatcher ─────────────────────────────────────────────────────────
function render(){
  const userNav=document.getElementById('user-nav');
  const adminNav=document.getElementById('admin-nav');
  const adminBar=document.getElementById('admin-bar');

  if(S.adminOK){
    userNav.style.display='none';
    adminNav.style.display='flex';
    adminBar.classList.add('show');
    // sync admin nav active
    ['adm-proj','adm-options'].forEach(t=>{
      const b=document.getElementById('nav-'+t);
      if(b)b.classList.toggle('active',S.tab===t);
    });
    if(S.tab==='adm-proj')renderAdmProj();
    else if(S.tab==='adm-options')renderAdmOptions();
  }else{
    userNav.style.display='flex';
    adminNav.style.display='none';
    adminBar.classList.remove('show');
    ['new','history'].forEach(t=>{
      const b=document.getElementById('nav-'+t);
      if(b)b.classList.toggle('active',S.tab===t);
    });
    if(S.tab==='new')renderNew();
    else if(S.tab==='history')renderHistory();
  }
}

function switchUserTab(tab){S.tab=tab;render();}
function switchAdminTab(tab){S.tab=tab;render();}

function onCountryChange(){
  const c=document.getElementById('sel-country').value;
  const yr=getRocYear();
  const btn=document.getElementById('submit-btn');
  if(btn){btn.disabled=!c;btn.textContent=c?'🔢 立即取號':'🔢 立即取號（請先選擇國別）';}
  const pn=document.getElementById('preview-num');
  if(pn)pn.textContent=(c||'??')+' · '+yr+' · '+(c?String(nextSeq(c)).padStart(3,'0'):'???');
  const info=document.getElementById('seq-info');
  if(!info)return;
  if(!c){info.style.display='none';return;}
  const cur=curSeq(c);
  document.getElementById('seq-label').textContent=c+yr;
  document.getElementById('seq-cur').textContent=cur>0?fmtNum(c,yr,cur):'（尚無記錄）';
  document.getElementById('seq-nxt').textContent=fmtNum(c,yr,cur+1);
  info.style.display='block';
}

async function submitForm(){
  const c=document.getElementById('sel-country').value;
  const cat=document.getElementById('sel-category').value;
  const nm=document.getElementById('inp-name').value.trim();
  const requester=document.getElementById('inp-requester').value.trim();
  const desc=document.getElementById('inp-desc').value.trim();
  const duedateRaw=document.getElementById('inp-duedate').value; // yyyy-mm-dd
  // 轉成 yyyy/mm/dd 格式
  const duedate=duedateRaw?duedateRaw.replace(/-/g,'/'):'';
  document.getElementById('err-country').style.display=!c?'block':'none';
  document.getElementById('err-category').style.display=!cat?'block':'none';
  document.getElementById('err-name').style.display=!nm?'block':'none';
  document.getElementById('err-requester').style.display=!requester?'block':'none';
  document.getElementById('err-duedate').style.display=!duedate?'block':'none';
  document.getElementById('err-desc').style.display=!desc?'block':'none';
  if(!c||!cat||!nm||!requester||!duedate||!desc)return;

  const btn=document.getElementById('submit-btn');
  btn.disabled=true;btn.textContent='取號中，請稍候...';
  setSyn('sv');

  const fresh=await fbGet(P_COUNTERS);
  if(fresh)S.counters=fresh;

  const yr=getRocYear();
  const key=makeKey(c);
  const seq=(S.counters[key]||0)+1;
  const num=fmtNum(c,yr,seq);
  S.counters[key]=seq;

  const now=new Date();
  const record={
    num,country:c,year:yr,seq,category:cat,name:nm,requester,desc,
    date:now.toLocaleDateString('zh-TW',{year:'numeric',month:'2-digit',day:'2-digit'}),
    time:now.toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'}),
    ts:now.getTime()
  };

  const[ok1,ok2]=await Promise.all([fbPatch(P_COUNTERS,{[key]:seq}),fbPost(P_RECORDS,record)]);
  setSyn(ok1&&ok2?'ok':'err');
  S.records.unshift(record);
  S.lastToastNum=num;
  // 初始化新記錄的 projDetails（預設進行中）
  // 初始化新記錄的 projDetails，帶入期望完成日
  if(!S.projDetails[num]) S.projDetails[num]={status:'',owner:'',launch:duedate,progress:'',note:'',reqContent:desc};
  // 若 duedate 有填，同步寫入 Firebase proj_details
  if(duedate||desc){
    await fbPatch(P_PROJ+'/'+num,{launch:duedate,reqContent:desc});
  }

  renderNew();
  setTimeout(()=>{
    const t=document.getElementById('toast');
    const tn=document.getElementById('toast-num-text');
    if(t&&tn){
      tn.textContent=num;
      t.style.display='block';
      // 加入「前往專案控管」按鈕
      const existing=t.querySelector('.go-proj-btn');
      if(!existing){
        const goBtn=document.createElement('button');
        goBtn.className='go-proj-btn';
        goBtn.textContent='📋 前往專案控管';
        goBtn.style.cssText='font-size:12px;padding:4px 10px;border:1px solid var(--green);border-radius:var(--radius-s);background:#fff;cursor:pointer;color:var(--green);font-family:inherit;margin-left:8px;flex-shrink:0';
        goBtn.onclick=()=>{
          t.style.display='none';
          // 進入後台專案控管
          S.adminOK=true;S.tab='adm-proj';
          projYear=getRocYear();
          projQuarter=0;projCat='';projStatusFilter='';
          render();
          scrollTo(0,0);
          setTimeout(()=>{
            const card=document.getElementById('pc-'+num);
            if(card){card.scrollIntoView({behavior:'smooth',block:'center'});}
          },400);
        };
        const numEl=t.querySelector('.toast-num');
        if(numEl) numEl.appendChild(goBtn);
      }
    }
    setTimeout(()=>{const t2=document.getElementById('toast');if(t2)t2.style.display='none';},10000);
  },0);
}


function copyToast(){
  const num=S.lastToastNum;if(!num)return;
  navigator.clipboard.writeText(num).then(()=>{
    const b=document.querySelector('.copy-big-btn');
    if(b){b.textContent='✓ 已複製';setTimeout(()=>b.textContent='複製編號',1500);}
  }).catch(()=>alert('編號：'+num));
}

// ── User: History ─────────────────────────────────────────────────────────────
function renderHistory(){
  const yr=getRocYear();
  const today=new Date().toLocaleDateString('zh-TW',{year:'numeric',month:'2-digit',day:'2-digit'});
  const fc=document.getElementById('filter-country')?.value||'';
  const fy=document.getElementById('filter-year')?.value||'';
  let filtered=S.records;
  if(fc)filtered=filtered.filter(r=>r.country===fc);
  if(fy)filtered=filtered.filter(r=>r.year===fy);

  const rowsHtml=filtered.length===0?'<div class="empty">尚無符合記錄</div>':
    `<table class="history-table"><thead><tr><th>編號</th><th>項目</th><th>名稱</th><th>取號人</th><th>時間</th></tr></thead><tbody>${
      filtered.map(r=>`<tr>
        <td><span class="num-badge">${escH(r.num)}</span><button class="copy-btn" onclick="cpNum('${escH(r.num)}',this)">複製</button></td>
        <td><span class="cat-badge">${escH(r.category)}</span></td>
        <td style="min-width:130px;max-width:220px;font-size:12px;word-break:break-all;white-space:pre-wrap">${escH(r.name)}</td>
        <td style="font-size:12px;white-space:nowrap">${escH(r.requester||'—')}</td>
        <td style="color:var(--muted);font-size:11px">${r.date}<br>${r.time}</td>
      </tr>`).join('')
    }</tbody></table>`;

  document.getElementById('main-content').innerHTML=`
    <div class="stats-row">
      <div class="stat"><div class="stat-v">${S.records.length}</div><div class="stat-l">總取號數</div></div>
      <div class="stat"><div class="stat-v">${S.records.filter(r=>r.date===today).length}</div><div class="stat-l">今日取號</div></div>
      <div class="stat"><div class="stat-v">${S.records.filter(r=>r.year===yr).length}</div><div class="stat-l">本年度</div></div>
    </div>
    <div class="card">
      <div class="card-title">📋 取號記錄</div>
      <div class="filter-row">
        <select class="filter-select" id="filter-country" onchange="renderHistory()">
          <option value="">全部國別</option>
          <option value="TW"${fc==='TW'?' selected':''}>TW 台灣</option>
          <option value="US"${fc==='US'?' selected':''}>US 美國</option>
          <option value="KR"${fc==='KR'?' selected':''}>KR 韓國</option>
          <option value="JP"${fc==='JP'?' selected':''}>JP 日本</option>
          <option value="HK"${fc==='HK'?' selected':''}>HK 香港</option>
          ${S.options.countries.map(o=>`<option value="${escH(o.code)}"${fc===o.code?' selected':''}>${escH(o.code)} ${escH(o.label)}</option>`).join('')}
        </select>
        <select class="filter-select" id="filter-year" onchange="renderHistory()">
          <option value="">全部年度</option>
          <option value="115"${fy==='115'?' selected':''}>民國115年</option>
          <option value="114"${fy==='114'?' selected':''}>民國114年</option>
          <option value="113"${fy==='113'?' selected':''}>民國113年</option>
        </select>
      </div>
      ${rowsHtml}
    </div>`;
}
function cpNum(num,btn){
  navigator.clipboard.writeText(num).then(()=>{btn.textContent='✓';setTimeout(()=>btn.textContent='複製',1500);})
  .catch(()=>alert('編號：'+num));
}

async function checkInitStatus(){

  Object.entries(c).sort().forEach(([k,v])=>ilog(`  ${k} → ${String(v).padStart(3,'0')} 號`,'log-ok'));

async function doInit(){
  const btn=document.getElementById('init-btn');if(!btn)return;
  btn.disabled=true;btn.textContent='初始化中...';
  const el=document.getElementById('init-log');if(el){el.style.display='block';el.innerHTML='';}
  try{
    ilog('① 寫入計數器...','log-info');
    const ok=await fbSet(P_COUNTERS,INIT_COUNTERS);
    if(!ok)throw new Error('計數器寫入失敗');
    Object.entries(INIT_COUNTERS).forEach(([k,v])=>ilog(`  ✓ ${k} → ${String(v).padStart(3,'0')}`,'log-ok'));
    S.counters={...INIT_COUNTERS};
    ilog('\n② 寫入 115年取號記錄（33筆）...','log-info');
    for(let i=0;i<INIT_RECORDS.length;i++){
      await fbPost(P_RECORDS,INIT_RECORDS[i]);
      ilog(`  ✓ ${INIT_RECORDS[i].num}  ${INIT_RECORDS[i].name}`,'log-ok');
    }
    ilog('\n✅ 初始化完成！','log-ok');
    if(btn){btn.textContent='✅ 已完成';btn.style.background='var(--green)';}
    const raw=await fbGet(P_RECORDS);
    if(raw&&typeof raw==='object')S.records=Object.values(raw).sort((a,b)=>(b.ts||0)-(a.ts||0));
    S.fbLoaded=true;
  }catch(e){
    ilog('\n❌ 錯誤：'+e.message,'log-err');
    if(btn){btn.disabled=false;btn.textContent='重新執行';}
  }
}

const STATUS_OPTS=['進行中','尚未開始','已完成','已上市','不執行','結案','持續','暫緩','待確認'];
const STATUS_COLOR={
  '進行中':'var(--amber-l)','尚未開始':'var(--blue-l)','已完成':'var(--green-l)',
  '已上市':'var(--green-l)','不執行':'var(--red-l)','結案':'var(--bg)',
  '持續':'var(--accent-l)','暫緩':'var(--red-l)','待確認':'#FEF3E2'
};
const STATUS_TC={
  '進行中':'var(--amber)','尚未開始':'var(--blue)','已完成':'var(--green)',
  '已上市':'var(--green)','不執行':'var(--red)','結案':'var(--muted)',
  '持續':'var(--accent-t)','暫緩':'var(--red)','待確認':'var(--amber)'
};
const CAT_GROUPS=['樣品','樣品/規格','餅體','成本試算','新品/成本試算','系統認證'];

// State for proj view
let projYear=getRocYear();   // 目前選擇的年度（民國年字串，如 '115'）
let projQuarter=0;           // 0=全年, 1-4=第幾季
let projCat='';              // 篩選類別，空字串=全部
let projStatusFilter='';     // 狀態快捷篩選：'done'|'active'|'overdue'|''

// 取號日期屬於哪一季（優先用 date 字串，fallback 用 ts）
function getQuarter(r){
  // date 格式: '2026/01/01' or '2026/1/1'
  let month=0,day=0;
  if(r.date){
    const parts=r.date.replace(/-/g,'/').split('/');
    if(parts.length>=3){month=parseInt(parts[1]);day=parseInt(parts[2]);}
    else if(parts.length>=2){month=parseInt(parts[1]);}
  }
  // 初始化時用的假日期 (月=1,日=1且time=00:00) → 無法判斷季度，歸 0
  if(month===1&&day===1&&(!r.time||r.time==='00:00')) return 0;
  if(!month&&r.ts){month=new Date(r.ts).getMonth()+1;}
  if(!month) return 0;
  return month<=3?1:month<=6?2:month<=9?3:4;
}

// 年度清單（從 records 取出所有年份，並補上 counters 裡有的年份）
function getYears(){
  const ys=new Set();
  S.records.forEach(r=>{ if(r.year) ys.add(r.year); });
  // 也從 counters key 補充（格式如 TW115 → 115）
  Object.keys(S.counters).forEach(k=>{
    const m=k.match(/^[A-Z]+(\d{3})$/);
    if(m) ys.add(m[1]);
  });
  return Array.from(ys).sort((a,b)=>Number(b)-Number(a));
}

function rocToAD(yr){return parseInt(yr)+1911;}

function projStatusClass(s){
  if(!s||s==='尚未開始') return 'nb-pend';
  if(s==='進行中'||s==='持續') return 'nb-prog';
  if(s==='已完成'||s==='已上市') return 'nb-done';
  if(s==='不執行'||s==='暫緩'||s==='結案') return 'nb-stop';
  return 'nb-def';
}

function renderProj(){
  const years=getYears();
  if(!years.length){
    document.getElementById('main-content').innerHTML='<div class="empty">尚無取號記錄</div>';
    return;
  }
  // 確保 projYear 在可用年份中
  if(!years.includes(projYear)) projYear=years[0];

  // 全年記錄（當年度）
  const yearRec=S.records.filter(r=>r.year===projYear).sort((a,b)=>(a.seq||0)-(b.seq||0)||(a.country||"").localeCompare(b.country||""));

  // 季度篩選
  // projQuarter=0(全年)：顯示全部
  // projQuarter=1-4：顯示該季 + 無法判斷季度的記錄（假日期，確保不遺漏）
  const filtered=projQuarter===0
    ? yearRec
    : yearRec.filter(r=>{ const q=getQuarter(r); return q===projQuarter||q===0; });

  // 國別 / 狀態篩選
  const fc=document.getElementById('proj-fc')?.value||'';
  const fs=document.getElementById('proj-fs')?.value||'';
  let shown=filtered;
  if(fc) shown=shown.filter(r=>r.country===fc);
  if(fs) shown=shown.filter(r=>(S.projDetails[r.num]?.status||'')===fs);

  // ── 統計（全年度）──
  const counts={prog:0,done:0,other:0};
  yearRec.forEach(r=>{
    const s=S.projDetails[r.num]?.status||'';
    if(!s||s==='進行中'||s==='持續'||s==='尚未開始'||s==='待確認') counts.prog++;
    else if(s==='已完成'||s==='已上市') counts.done++;
    else counts.other++;
  });

  // ── 季度按鈕計數 ──
  const qCnt=[0,0,0,0,0]; // idx 0=全年, 1-4=各季
  yearRec.forEach(r=>{ const q=getQuarter(r); qCnt[0]++; if(q>=1&&q<=4)qCnt[q]++; });
  // 季度篩選：quarter=0 的記錄（假日期）歸入「全年」，各季不計入

  // ── 年度按鈕 HTML ──
  // 年度按鈕計數：優先用 records 筆數，無 records 則用 counters 最高流水號合計
  function yearCount(y){
    const rc=S.records.filter(r=>r.year===y).length;
    if(rc>0) return rc;
    // 從 counters 計算（如 TW115:30, US115:3 → 33）
    return Object.entries(S.counters)
      .filter(([k])=>k.endsWith(y))
      .reduce((s,[,v])=>s+v,0);
  }
  const yearBtns=years.map(y=>`
    <button class="wt${y===projYear?' on':''}" onclick="setProjYear('${y}')">
      <span style="font-size:12px;font-weight:700">${rocToAD(y)}年</span>
      <span class="wt-sub">民國${y}年</span>
      <span class="wt-n">${yearCount(y)}</span>
    </button>`).join('');

  // ── 季度按鈕 HTML ──
  const QLabels=['全年','第一季','第二季','第三季','第四季'];
  const QSubs=['','1–3月','4–6月','7–9月','10–12月'];
  const quarterBtns=[0,1,2,3,4].map(q=>`
    <button class="wt${projQuarter===q?' on':''}" onclick="setProjQuarter(${q})">
      <span style="font-size:12px;font-weight:700">${QLabels[q]}</span>
      <span class="wt-sub">${QSubs[q]}</span>
      <span class="wt-n">${qCnt[q]}</span>
    </button>`).join('');

  // ── 類別清單（從當年度全部記錄取，不受篩選影響）──
  const allCats=[...new Set(yearRec.map(r=>r.category))].sort((a,b)=>{
    const ia=CAT_GROUPS.indexOf(a),ib=CAT_GROUPS.indexOf(b);
    return (ia<0?99:ia)-(ib<0?99:ib);
  });
  // 若 projCat 不在清單中則清空
  if(projCat&&!allCats.includes(projCat)) projCat='';

  // ── 逾期判斷：有預計上市日且日期已過，且狀態非已完成/已上市/結案/不執行 ──
  const doneStatus=new Set(['已完成','已上市','結案','不執行']);
  const activeStatus=new Set(['進行中','持續','尚未開始','待確認']);
  const today=new Date(); today.setHours(0,0,0,0);
  function isOverdue(r){
    const d=S.projDetails[r.num]||{};
    if(doneStatus.has(d.status)) return false;
    if(!d.launch) return false;
    // 解析 launch，格式可能是 2026/08 或 2026/08/31
    const parts=d.launch.replace(/-/g,'/').split('/');
    if(parts.length<2) return false;
    const y=parseInt(parts[0]),m=parseInt(parts[1])-1;
    const day=parts[2]?parseInt(parts[2]):1;
    const launchDate=new Date(y,m,day);
    return launchDate<today;
  }
  function isActive(r){
    const d=S.projDetails[r.num]||{};
    const st=d.status||'';
    return activeStatus.has(st)||st===''; // 未設定視為進行中
  }
  function isDone(r){
    const d=S.projDetails[r.num]||{};
    return doneStatus.has(d.status||'');
  }

  // 狀態快捷篩選
  let shownByStatus=shown;
  if(projStatusFilter==='done')    shownByStatus=shown.filter(r=>isDone(r));
  else if(projStatusFilter==='active')  shownByStatus=shown.filter(r=>isActive(r));
  else if(projStatusFilter==='overdue') shownByStatus=shown.filter(r=>isOverdue(r));

  // 類別篩選
  const shownByCat=projCat?shownByStatus.filter(r=>r.category===projCat):shownByStatus;
  const displayCats=projCat
    ?[projCat]
    :[...new Set(shownByCat.map(r=>r.category))].sort((a,b)=>{

const TODAY_PROJ=(()=>{const n=new Date();return `${n.getMonth()+1}/${n.getDate()}`;})();
const TODAY_PROJ_TMPL=TODAY_PROJ; // alias for use in template literals

async function savePCard(num){
  const ns=document.getElementById('pes-'+num)?.value||'';
  const no=document.getElementById('peo-'+num)?.value.trim()||'';
  const nl=document.getElementById('pel-'+num)?.value.trim()||'';
  const nu=document.getElementById('peu-'+num)?.value.trim()||'';
  const nn=document.getElementById('pen-'+num)?.value.trim()||'';

  if(!S.projDetails[num])S.projDetails[num]={};
  const d=S.projDetails[num];
  d.status=ns;d.owner=no;d.launch=nl;d.note=nn;

  if(nu){
    const prev=d.progress?d.progress.split('\n').filter(Boolean):[];
    prev.push(`${prev.length+1}.${TODAY_PROJ} ${nu}`);
    d.progress=prev.join('\n');
  }

  setSyn('sv');
  await fbPatch(P_PROJ+'/'+num, d);
  setSyn('ok');

  // In-place UI update
  const card=document.getElementById('pc-'+num);
  if(card){
    const isDone=ns==='已完成'||ns==='已上市'||ns==='結案'||ns==='不執行';
    card.classList.toggle('pstat-done',isDone);
    const badge=card.querySelector('.pcard-status');
    if(badge){
      badge.textContent=ns||'進行中';
      badge.style.background=STATUS_COLOR[ns]||'var(--bg)';
      badge.style.color=STATUS_TC[ns]||'var(--muted)';
      badge.className='pcard-status '+projStatusClass(ns);
    }
    const sv=document.getElementById('psv-'+num);
    if(sv){sv.style.display='inline';setTimeout(()=>sv.style.display='none',2500);}
    const pb=document.getElementById('puf-'+num);
    if(pb){
      const lines=(d.progress||'').split('\n').filter(Boolean);
      pb.innerHTML=lines.length
        ? lines.map((l,i)=>{
            const m=l.match(/^(\d+\.\S+)\s(.*)$/);
            if(m) return `<div class="upd-line${i===lines.length-1?' upd-latest':''}"><span class="upd-seq">${escH(m[1])}</span> ${escH(m[2])}</div>`;
            return `<div class="upd-line${i===lines.length-1?' upd-latest':''}">${escH(l)}</div>`;
          }).join('')
        : '<span style="color:var(--hint);font-size:11px">尚無進度記錄</span>';
      // update the placeholder hint for next entry
      const ta=document.getElementById('peu-'+num);
      if(ta) ta.placeholder=`填入本次進度說明，儲存後自動加上序號與日期...（序號接續上次：${lines.length+1}）`;
    }
  }

  const msg=document.getElementById('proj-save-msg');
  if(msg){msg.style.display='block';clearTimeout(msg._t);msg._t=setTimeout(()=>msg.style.display='none',2500);}
  if(document.getElementById('peu-'+num)) document.getElementById('peu-'+num).value='';
  closePEdit(num);
}

async function downloadExcelYear(yr){
  yr=yr||getRocYear();
  const rawP=await fbGet(P_PROJ);
  if(rawP&&typeof rawP==='object') S.projDetails={...rawP};
  const adYear=parseInt(yr)+1911;
  const records=S.records.filter(r=>r.year===yr)
    .sort((a,b)=>a.seq-b.seq||a.country.localeCompare(b.country));
  if(!records.length){alert(adYear+'年度尚無取號記錄');return;}
  const wb=XLSX.utils.book_new();

  // ── Sheet1: 年度專案總表 ──
  const sheetTitle=adYear+'年度產品專案控管表';
  const headers=['項次','產品開發\n需求單編號','項目','名稱','取號人','需求內容','目前進度說明','期望完成日','負責人','結案/暫緩','狀態','備註','國別'];
  const dataRows=records.map((r,i)=>{
    const d=S.projDetails[r.num]||{};
    const cleanProg=(d.progress||'').split('\n').filter(Boolean)
      .map(l=>l.replace(/^\d+\.\S+\s/,'').trim()).join('\n');
    return [i+1,r.num,r.category,r.name,r.requester||'',(d.reqContent||r.desc||''),
      cleanProg,d.launch||'',d.owner||'',d.status||'',d.status||'',d.note||'',r.country];
  });
  const ws1=XLSX.utils.aoa_to_sheet([[sheetTitle,...Array(12).fill('')],headers,...dataRows]);
  ws1['!cols']=[{wch:6},{wch:12},{wch:12},{wch:30},{wch:8},{wch:36},{wch:44},{wch:10},{wch:8},{wch:10},{wch:10},{wch:12},{wch:6}];
  ws1['!rows']=[{hpt:24},{hpt:52},...records.map(()=>({hpt:60}))];
  ws1['!merges']=[{s:{r:0,c:0},e:{r:0,c:12}}];

  // 套用儲存格樣式
  const range=XLSX.utils.decode_range(ws1['!ref']);
  for(let R=range.s.r;R<=range.e.r;R++){
    for(let C=range.s.c;C<=range.e.c;C++){
      const addr=XLSX.utils.encode_cell({r:R,c:C});
      if(!ws1[addr])ws1[addr]={t:'s',v:''};
      const isTitle=R===0,isHeader=R===1,isEven=R>1&&R%2===0;
      ws1[addr].s={
        font:{name:'微軟正黑體',sz:isTitle?14:11,bold:isTitle||isHeader,color:{rgb:isTitle?'FFFFFF':'000000'}},
        fill:{fgColor:{rgb:isTitle?'1F3864':isHeader?'B8CCE4':isEven?'EEF2F8':'FFFFFF'},patternType:'solid'},
        alignment:{wrapText:true,vertical:'top',horizontal:isTitle?'center':C===0?'center':'left'},
        border:{top:{style:'thin',color:{rgb:'C8C5BE'}},bottom:{style:'thin',color:{rgb:'C8C5BE'}},left:{style:'thin',color:{rgb:'C8C5BE'}},right:{style:'thin',color:{rgb:'C8C5BE'}}}
      };
    }
  }
  XLSX.utils.book_append_sheet(wb,ws1,adYear+'年專案總表');

  // ── Sheet2: 統計總覽 ──
  const countries=['TW','US','KR','JP','HK',...S.options.countries.map(c=>c.code)];
  const statusList=['進行中','尚未開始','已完成','已上市','不執行','結案','持續','暫緩','待確認'];
  const statMap={};
  records.forEach(r=>{
    const d=S.projDetails[r.num]||{};
    const c=r.country,st=d.status||'進行中';
    if(!statMap[c])statMap[c]={};
    statMap[c][st]=(statMap[c][st]||0)+1;
  });
  const statsHeader=['國別',...statusList,'總計'];
  const statsRows=countries.filter(c=>statMap[c]).map(c=>{
    const m=statMap[c]||{};
    const all=Object.values(m).reduce((s,v)=>s+v,0);
    return [c,...statusList.map(st=>m[st]||0),all];
  });
  const totalRow=['合計',...statusList.map(st=>records.filter(r=>(S.projDetails[r.num]?.status||'進行中')===st).length),records.length];
  const ws2=XLSX.utils.aoa_to_sheet([[adYear+'年度 各國別專案狀態統計',...Array(statsHeader.length-1).fill('')],statsHeader,...statsRows,totalRow]);
  ws2['!merges']=[{s:{r:0,c:0},e:{r:0,c:statsHeader.length-1}}];
  ws2['!cols']=[{wch:8},...Array(statusList.length+3).fill({wch:9})];
  XLSX.utils.book_append_sheet(wb,ws2,'統計總覽');

  const dateStr=new Date().toLocaleDateString('zh-TW',{year:'numeric',month:'2-digit',day:'2-digit'}).replace(/\//g,'');
  XLSX.writeFile(wb,'研發專案控管表_'+adYear+'_'+dateStr+'.xlsx');
}

async function downloadExcel(){
  const btn=document.getElementById('dl-btn');
  const msg=document.getElementById('export-msg');
  if(btn){btn.disabled=true;btn.textContent='產生中...';}
  if(msg){msg.style.display='block';msg.style.color='var(--amber)';msg.textContent='⏳ 正在產生 Excel 檔案...';}
  try{
    await downloadExcelYear(getRocYear());
    if(msg){msg.style.color='var(--green)';msg.textContent='✅ 下載完成！';}
  }catch(e){
    if(msg){msg.style.color='var(--red)';msg.textContent='❌ 產生失敗：'+e.message;}
    console.error(e);
  }finally{
    if(btn){btn.disabled=false;btn.textContent='📥 下載最新控管表';}
  }
}


// ── Boot：直接顯示取號畫面，Firebase 背景載入 ─────────────────────────────────
render();
loadFirebase().then(()=>{
  // Firebase 載完後一律重新 render 目前畫面（讓資料即時顯示）
  if(!S.adminOK) render();
});
</script>
